import quantihack as qh

# ═══════════════════════════════════════════════════════════════
# QUANTIHACK TRADING ALGO — PRODUCTION VERSION
# Strategy: Multi-signal scoring + Surge detection + Auto calibration
# ═══════════════════════════════════════════════════════════════

# ── USER CONTROLS ──────────────────────────────────────────────
SYMBOLS = [
    'SYN-AAPL', 'SYN-GOOG', 'SYN-TSLA', 'SYN-AMZN',
    'SYN-MSFT', 'SYN-NVDA', 'SYN-META', 'SYN-JPM',
    'CMD-GOLD', 'CMD-BTC', 'CMD-DMND', 'CMD-PLAT',
    'CMD-COPPER', 'CMD-LITHIUM',
    'FX-EURUSD', 'FX-GBPUSD', 'FX-USDJPY',
    'IDX-SP500', 'IDX-NIKKEI', 'IDX-FTSE'
]

BASELINE_NOTIONAL = 50000    # per trade in normal market — increase as cash grows
SURGE_NOTIONAL    = 1000000  # per trade when surge detected
SURGE_THRESHOLD   = 5.0      # surge must be 5x normal volatility
DAILY_LOSS_LIMIT  = 0.20     # stop all trading if down 20%
MAX_HOLD_TICKS    = 200      # exit if holding > 200 ticks with no profit (~2.5 min)
MAX_SPREAD        = 0.006    # skip asset if spread > 0.6%
MAX_POSITIONS     = 4        # max simultaneous positions
MIN_SCORE         = 3.0      # minimum signal score to enter
MAX_LOSSES        = 3        # circuit breaker — stop trading asset after 3 losses
# ───────────────────────────────────────────────────────────────

tick_count    = 0
trade_log     = {}
vol_cache     = {}
loss_count    = {}
total_loss    = 0.0
starting_cash = 1000000

def on_tick(prices, positions, orders, history):
    global tick_count, trade_log, vol_cache, loss_count
    global total_loss, starting_cash
    tick_count += 1
    result = []

    # ── DAILY LOSS CIRCUIT BREAKER ─────────────────────────────
    if total_loss / starting_cash >= DAILY_LOSS_LIMIT:
        return result

    # ── PHASE 1: EXITS ─────────────────────────────────────────
    for symbol, pos in list(positions.items()):
        try:
            qty = pos.get('qty', 0)
            if qty == 0:
                trade_log.pop(symbol, None)
                continue

            price = prices.get(symbol, {}).get('price', 0)
            if price <= 0:
                continue

            entry = pos.get('avg_entry_price', price)
            is_long = qty > 0
            pnl = (price - entry) / entry if is_long else (entry - price) / entry
            held = tick_count - trade_log.get(symbol, {}).get('entry_tick', tick_count)

            # update peak
            if symbol in trade_log:
                if is_long:
                    trade_log[symbol]['peak'] = max(trade_log[symbol].get('peak', price), price)
                else:
                    trade_log[symbol]['peak'] = min(trade_log[symbol].get('peak', price), price)

            # get calibrated params from vol cache
            asset_vol     = vol_cache.get(symbol, 0.001)
            trailing_stop = max(asset_vol * 4, 0.008)
            stop_loss     = max(asset_vol * 5, 0.012)

            should_exit = False

            # take profit
            if pnl >= 0.30:
                should_exit = True

            # stop loss
            if pnl <= -stop_loss:
                should_exit = True
                loss_count[symbol] = loss_count.get(symbol, 0) + 1
                total_loss += abs(pnl) * BASELINE_NOTIONAL

            # trailing stop
            if symbol in trade_log and pnl > 0.005:
                peak = trade_log[symbol].get('peak', price)
                if is_long:
                    drop = (peak - price) / peak if peak > 0 else 0
                    if drop >= trailing_stop:
                        should_exit = True
                else:
                    rise = (price - peak) / peak if peak > 0 else 0
                    if rise >= trailing_stop:
                        should_exit = True

            # time based exit
            if held > MAX_HOLD_TICKS and pnl < 0.005:
                should_exit = True

            # RSI exit
            hist = qh.market_history.prices(symbol, 50)
            if hist and len(hist) >= 14:
                rsi_vals = qh.rsi(hist, 14)
                rsi = next((v for v in reversed(rsi_vals) if v is not None), None)
                if rsi:
                    if is_long and rsi > 72:
                        should_exit = True
                    elif not is_long and rsi < 28:
                        should_exit = True

            if should_exit:
                side = 'SELL' if is_long else 'BUY'
                result.append({
                    'symbol': symbol,
                    'side': side,
                    'type': 'MARKET',
                    'qty': round(abs(qty), 4)
                })
                trade_log.pop(symbol, None)

        except:
            continue

    if len(result) >= 10:
        return result[:10]

    # ── PHASE 2: SCAN AND SCORE ────────────────────────────────
    num_pos = sum(1 for p in positions.values() if p.get('qty', 0) != 0)
    if num_pos >= MAX_POSITIONS:
        return result

    # rotate symbols every 3 ticks for speed
    offset = tick_count % 3
    scan_symbols = SYMBOLS[offset::3]

    candidates = []

    for symbol in scan_symbols:
        try:
            if symbol in positions and positions[symbol].get('qty', 0) != 0:
                continue
            if loss_count.get(symbol, 0) >= MAX_LOSSES:
                continue

            p_dat = prices.get(symbol)
            if not p_dat:
                continue
            price = p_dat.get('price', 0)
            if price <= 0:
                continue

            # spread check
            bid = p_dat.get('bid', price)
            ask = p_dat.get('ask', price)
            spread = (ask - bid) / price if price > 0 else 1
            if spread > MAX_SPREAD:
                continue

            # get history
            hist = qh.market_history.prices(symbol, 200)
            if not hist or len(hist) < 30:
                continue
            hist = [v for v in hist if v is not None]
            if len(hist) < 15:
                continue

            # ── LEARN VOLATILITY ───────────────────────────────
            if symbol not in vol_cache or tick_count % 10 == 0:
                returns = [(hist[i]-hist[i-1])/hist[i-1]
                           for i in range(1, min(len(hist), 100))]
                vol_cache[symbol] = sum(abs(r) for r in returns)/len(returns) if returns else 0.001
            asset_vol = vol_cache[symbol]

            # ── SURGE DETECTION ────────────────────────────────
            surge = (hist[-1]-hist[-5])/hist[-5] if len(hist)>=5 else 0
            surge_confirm = (hist[-1]-hist[-10])/hist[-10] if len(hist)>=10 else 0
            mom = (hist[-1]-hist[-2])/hist[-2] if len(hist)>=2 else 0
            surge_ratio = abs(surge)/asset_vol if asset_vol > 0 else 1
            is_surging = surge_ratio >= SURGE_THRESHOLD

            score = 0.0
            direction = 1  # 1=BUY -1=SELL

            # ── SIGNAL 1: RSI ──────────────────────────────────
            try:
                rsi_vals = qh.rsi(hist, 14)
                rsi = next((v for v in reversed(rsi_vals) if v is not None), None)
                if rsi is not None:
                    if rsi < 25:   score += 5
                    elif rsi < 32: score += 3
                    elif rsi < 40: score += 1
                    elif rsi > 78: score -= 3; direction = -1
                    elif rsi > 70: score -= 1; direction = -1
            except:
                rsi = 50

            # ── SIGNAL 2: SURGE ────────────────────────────────
            if is_surging:
                if surge > 0 and surge_confirm > 0:
                    score += 6
                    direction = 1
                elif surge < 0 and surge_confirm < 0:
                    score += 6
                    direction = -1

            # ── SIGNAL 3: MOMENTUM ─────────────────────────────
            try:
                r5  = (hist[-1]-hist[-6])/hist[-6]  if len(hist)>=6  else 0
                r20 = (hist[-1]-hist[-21])/hist[-21] if len(hist)>=21 else 0
                if r20 < -0.005 and r5 > 0:
                    score += 3
                elif r5 > 0.002:
                    score += 1
                elif r5 < -0.002:
                    score -= 1
            except:
                pass

            # ── SIGNAL 4: BOLLINGER BANDS ──────────────────────
            try:
                if len(hist) >= 20:
                    bb = qh.bollinger_bands(hist, 20, 2)
                    if bb and bb[0] and bb[2]:
                        bb_u = next((v for v in reversed(bb[0]) if v is not None), None)
                        bb_l = next((v for v in reversed(bb[2]) if v is not None), None)
                        if bb_u and bb_l and bb_u > bb_l:
                            bb_pct = (price-bb_l)/(bb_u-bb_l)
                            if bb_pct < 0.10:   score += 4
                            elif bb_pct < 0.25: score += 2
                            elif bb_pct > 0.95: score -= 3; direction = -1
                            elif bb_pct > 0.80: score -= 1; direction = -1
            except:
                pass

            # ── SIGNAL 5: EMA CROSSOVER ────────────────────────
            try:
                if len(hist) >= 21:
                    ema8  = qh.ema(hist, 8)
                    ema21 = qh.ema(hist, 21)
                    e8  = next((v for v in reversed(ema8)  if v is not None), None)
                    e21 = next((v for v in reversed(ema21) if v is not None), None)
                    if e8 and e21 and e21 > 0:
                        if e8 > e21: score += 1.5
                        e8p  = next((v for v in reversed(ema8[:-3])  if v is not None), None)
                        e21p = next((v for v in reversed(ema21[:-3]) if v is not None), None)
                        if e8p and e21p:
                            if e8p < e21p and e8 > e21:
                                score += 2.5  # golden cross
                            elif e8p > e21p and e8 < e21:
                                score -= 2.5  # death cross
                                direction = -1
            except:
                pass

            # ── SIGNAL 6: ZSCORE ───────────────────────────────
            try:
                z_vals = qh.zscore(hist[-30:])
                if z_vals:
                    z = next((v for v in reversed(z_vals) if v is not None), None)
                    if z is not None:
                        if z < -2.0:   score += 3
                        elif z < -1.5: score += 1.5
                        elif z > 2.0:  score -= 3; direction = -1
                        elif z > 1.5:  score -= 1.5; direction = -1
            except:
                pass

            # ── SIGNAL 7: LINEAR REGRESSION ────────────────────
            try:
                recent = hist[-40:]
                slope, intercept, r2 = qh.linear_regression(
                    list(range(len(recent))), recent)
                norm_slope = slope/price
                if r2 > 0.5:
                    score += norm_slope * 500
                if r2 > 0.7:
                    score += norm_slope * 300
            except:
                pass

            # ── POSITION SIZING ────────────────────────────────
            if is_surging:
                notional = SURGE_NOTIONAL * min(surge_ratio/SURGE_THRESHOLD, 2.0)
            else:
                # scale with conviction
                if abs(score) > 10:
                    notional = BASELINE_NOTIONAL * 2.0
                elif abs(score) > 6:
                    notional = BASELINE_NOTIONAL * 1.5
                else:
                    notional = BASELINE_NOTIONAL

            trade_qty = round(notional/price, 4)
            if trade_qty <= 0:
                continue

            if abs(score) >= MIN_SCORE:
                candidates.append((abs(score), symbol, direction, price, trade_qty, is_surging))

        except:
            continue

    # ── PHASE 3: EXECUTE TOP SIGNALS ──────────────────────────
    # prioritise surges over normal signals
    candidates.sort(key=lambda x: (x[5], x[0]), reverse=True)
    slots = min(MAX_POSITIONS - num_pos, 10 - len(result))

    for score, symbol, direction, price, trade_qty, is_surging in candidates[:slots]:
        if len(result) >= 10:
            break
        if symbol in positions and positions[symbol].get('qty', 0) != 0:
            continue

        side = 'BUY' if direction == 1 else 'SELL'
        result.append({
            'symbol': symbol,
            'side': side,
            'type': 'MARKET',
            'qty': trade_qty
        })
        trade_log[symbol] = {
            'entry_tick': tick_count,
            'peak': price
        }

    return result[:10]